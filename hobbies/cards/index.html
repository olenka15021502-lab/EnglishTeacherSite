        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .flip-back { transform: rotateY(180deg); }
        .answer-reveal { color: #16a34a; font-weight: 700; margin-top: 0.5rem; display: none; }
        .answer-reveal.visible { display: block; }
        .flip-back button { margin-top: 0.75rem; padding: 0.5rem 1rem; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; }

                    </div>
